spring:
  application:
    name: Baemin_Mini
  profiles:
    active: ${APP_PROFILE:dev}

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:3000}
  jwt:
    secret: ${JWT_SECRET:cf45124c8fa917178797d760860f73b207fa09dc65f855a9e55cbf8f45a7fa5c}
    issuer: ${JWT_ISSUER:baemin-mini}
    access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:1}
    refresh-token-ttl-days: ${JWT_REFRESH_TOKEN_TTL_DAYS:7}
  upload:
    root-dir: ${UPLOAD_ROOT_DIR:uploads}
    public-path: ${UPLOAD_PUBLIC_PATH:/uploads}
    max-image-size-mb: ${UPLOAD_MAX_IMAGE_SIZE_MB:5}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    operations-sorter: alpha
    tags-sorter: alpha
